services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_secret_password
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"

  adminer:
    image: adminer:latest
    ports:
      - "8082:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula  # темы: pepa-linha, dracula, flat, etc
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_secret_password
      POSTGRES_DB: crm_db
      PYCHARM_HOST: host.docker.internal
    ports:
      - "8000:8000"   # Порт приложения
      - "5678:5678"  # Порт отладчика PyCharm
    volumes:
      - ./backend:/app
    cap_add:
      - SYS_PTRACE

    security_opt:
      - seccomp:unconfined

    command: 'bash -c "cd app && python -m debugpy --listen 0.0.0.0:5678 --wait-for-client -m uvicorn main:app --host 0.0.0.0 --port 8000"'

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - backend
